<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link rel="shortcut icon" href="./assets/affiliate-marketing.png" type="image/x-icon">

    <!-- Tailwind+DaisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">


     <!-- Icon - Font Awesome -->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <style>

        * {
            font-family: "Manrope", sans-serif;
        }

     </style>

</head>

<body>

    <header class="w-[80%] mx-auto py-[30px] my-[30px] border-b-2 border-b-gray-100 space-y-8">

        <h2 class="text-3xl font-bold text-[#323B49]"> Job Application Tracker </h2>

        <div class="header-code grid grid-cols-3 gap-3">
            
            <div class="card-1 shadow bg-base-200 rounded-md p-[20px]  space-y-2">
                <p>Total</p>
                <h2 class="text-2xl font-bold text-[#323B49]">8</h2>
            </div>
            <div class="card-2 shadow bg-base-200 rounded-md p-[20px]  space-y-2">
                <p>Interview</p>
                <h2 class="text-2xl font-bold text-green-500">0</h2>
            </div>
            <div class="card-3 shadow bg-base-200 rounded-md p-[20px]  space-y-2">
                <p>Rejected</p>
                <h2 class="text-2xl font-bold text-red-500">0</h2>
            </div>

        </div>

    </header>
    
    
</body>
</html>
